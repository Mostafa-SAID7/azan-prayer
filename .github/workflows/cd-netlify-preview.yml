name: CD - Netlify Preview Deploy

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: 20

jobs:
  preview-deploy:
    name: 🔍 Preview Deploy to Netlify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          VITE_ALADHAN_API_URL: ${{ secrets.VITE_ALADHAN_API_URL }}
          VITE_DEFAULT_CITY: ${{ secrets.VITE_DEFAULT_CITY }}
          VITE_DEFAULT_COUNTRY: ${{ secrets.VITE_DEFAULT_COUNTRY }}

      - name: Deploy preview to Netlify
        run: |
          npm install -g netlify-cli
          DEPLOY_OUTPUT=$(netlify deploy --dir=./dist --site=${{ secrets.NETLIFY_SITE_ID }} --auth=${{ secrets.NETLIFY_AUTH_TOKEN }})
          PREVIEW_URL=$(echo "$DEPLOY_OUTPUT" | grep -oP 'https://[a-z0-9]+-[a-z0-9]+--[a-z0-9-]+\.netlify\.app' | head -1)
          echo "deploy-url=$PREVIEW_URL" >> $GITHUB_OUTPUT
          echo "PREVIEW_URL=$PREVIEW_URL" >> $GITHUB_ENV
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        id: netlify

      - name: Comment preview URL
        uses: actions/github-script@v7
        if: env.PREVIEW_URL != ''
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const deployUrl = process.env.PREVIEW_URL;
            if (context.issue && context.issue.number) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `🚀 **Preview deployed to Netlify**\n\n[View Preview](${deployUrl})`
              });
            }

      - name: Add preview check
        run: |
          echo "✅ Preview deployed successfully"
          echo "URL: ${{ env.PREVIEW_URL }}"
