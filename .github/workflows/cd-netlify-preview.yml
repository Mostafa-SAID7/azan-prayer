name: CD - Netlify Preview Deploy

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: 18

jobs:
  preview-deploy:
    name: 🔍 Preview Deploy to Netlify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          VITE_ALADHAN_API_URL: ${{ secrets.VITE_ALADHAN_API_URL }}
          VITE_DEFAULT_CITY: ${{ secrets.VITE_DEFAULT_CITY }}
          VITE_DEFAULT_COUNTRY: ${{ secrets.VITE_DEFAULT_COUNTRY }}

      - name: Deploy preview to Netlify
        uses: nwtour/github-action-netlify-deploy@v2.3.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          netlify-auth-token: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          netlify-site-id: ${{ secrets.NETLIFY_SITE_ID }}
          build-dir: './dist'
          functions-dir: './netlify/functions'
          production-deploy: false
        id: netlify

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const deployUrl = '${{ steps.netlify.outputs.deploy-url }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview deployed to Netlify**\n\n[View Preview](${deployUrl})`
            });

      - name: Add preview check
        run: |
          echo "✅ Preview deployed successfully"
          echo "URL: ${{ steps.netlify.outputs.deploy-url }}"
