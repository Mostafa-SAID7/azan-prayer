version: '3.8'

services:
  # Production application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payer-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      VITE_ALADHAN_API_URL: ${VITE_ALADHAN_API_URL:-https://api.aladhan.com/v1}
      VITE_DEFAULT_CITY: ${VITE_DEFAULT_CITY:-Cairo}
      VITE_DEFAULT_COUNTRY: ${VITE_DEFAULT_COUNTRY:-Egypt}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - payer-network
    labels:
      com.payer.description: "Prayer Times PWA Application"
      com.payer.version: "0.1.0"

  # Development environment (optional)
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development
    container_name: payer-dev
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      VITE_ALADHAN_API_URL: ${VITE_ALADHAN_API_URL:-https://api.aladhan.com/v1}
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
    networks:
      - payer-network
    profiles:
      - dev

  # Nginx reverse proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: payer-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - payer-network
    profiles:
      - nginx

networks:
  payer-network:
    driver: bridge

volumes:
  app-node_modules:
    driver: local
