# Netlify Configuration for Payer - Islamic Prayer Times PWA

[build]
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV = "production"
  VITE_ALADHAN_API_URL = "https://api.aladhan.com/v1"
  VITE_DEFAULT_CITY = "Cairo"
  VITE_DEFAULT_COUNTRY = "Egypt"

# Error handling pages
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    # Security headers
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self), microphone=(), camera=()"
    
    # Caching headers
    Cache-Control = "public, max-age=3600, s-maxage=3600"

# Service worker caching
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "max-age=0, must-revalidate"

# Static assets caching
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Font files caching
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# API routes
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "private, max-age=3600"

# Preload critical resources
[[headers]]
  for = "/"
  [headers.values]
    Link = "</assets/vendor.*.js>; rel=preload; as=script, </assets/radix.*.js>; rel=preload; as=script"

# Image optimization
[[redirects]]
  from = "/image"
  to = "/.netlify/images?url=:url&w=:width&h=:height&q=:quality"

# Monitor performance
[[redirects]]
  from = "/api/health"
  to = "/index.html"
  status = 200

# Rate limiting (if using Netlify Functions)
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Context-specific settings
[context.production]
  command = "npm ci && npm run build"
  publish = "dist"

[context.preview]
  command = "npm ci && npm run build"
  publish = "dist"

[context.deploy-preview]
  command = "npm ci && npm run build"
  publish = "dist"

[context.branch-deploy]
  command = "npm ci && npm run build"
  publish = "dist"

# Environment variables per context
[context.production.environment]
  NODE_ENV = "production"
  VITE_DEBUG = "false"

[context.preview.environment]
  NODE_ENV = "production"
  VITE_DEBUG = "false"

[context.branch-deploy.environment]
  NODE_ENV = "production"
  VITE_DEBUG = "false"
